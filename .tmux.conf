# Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Vim-style splits
bind | split-window -h
bind - split-window -v

# Vim navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Clipboard for copy/paste outside tmux
set -g set-clipboard on
set -g allow-passthrough on
set -g mode-keys vi

bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

# Mouse & scrollback
set -g mouse on
set -g history-limit 100000
set -sg escape-time 0

# Status bar
set -g status-bg colour235
set -g status-fg colour223

# Active window
set -g window-status-current-style fg=colour214,bg=colour237,bold

# Inactive windows
set -g window-status-style fg=colour244,bg=colour235

# Pane borders
set -g pane-border-style fg=colour235
set -g pane-active-border-style fg=colour214

# Vi keys in copy mode
setw -g mode-keys vi
